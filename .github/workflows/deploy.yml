name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Babel
        run: npm install --save-dev @babel/core @babel/cli @babel/preset-react @babel/preset-env

      - name: Build JSX to JS
        run: |
          npx babel Monster_Butler_v160.jsx \
            --presets @babel/preset-react,@babel/preset-env \
            --out-file bundle.js

      - name: Create index.html
        run: |
          cat > index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
            <title>Monster Butler</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              html, body { width: 100%; height: 100%; overflow: hidden; background: #060606; }
              #root { position: fixed; top: 0; left: 0; width: 100dvw; height: 100dvh; }
            </style>
          </head>
          <body>
            <div id="root"></div>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
            <script src="bundle.js"></script>
            <script>
              const root = ReactDOM.createRoot(document.getElementById('root'));
              root.render(React.createElement(App));
            </script>
          </body>
          </html>
          HTML

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,node_modules,Monster_Butler_v160.jsx,package.json,package-lock.json'
